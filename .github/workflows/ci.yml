name: API Automation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  api-tests:
    name: REST Assured API Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CapstonePracticeAPI

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('CapstonePracticeAPI/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run API Tests
        run: mvn clean test

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: CapstonePracticeAPI/target/surefire-reports
          if-no-files-found: warn

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: CapstonePracticeAPI/allure-results
          if-no-files-found: warn

      # Checkout gh-pages branch if it exists
      - name: Checkout gh-pages
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # Generate Allure Report with history
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          gh_pages: gh-pages
          allure_results: CapstonePracticeAPI/allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      # Remove any accidental .git folder
      - name: Remove .git from Allure History
        if: always()
        run: rm -rf allure-history/.git

      # Publish to GitHub Pages
      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true